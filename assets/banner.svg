<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Dihas Sathnindu - Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56CCF2"/>
      <stop offset="0.55" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#c3704c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#c3704c"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2F80ED" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2F80ED" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#1b2433" stroke-width="1"/>
    </pattern>
    <clipPath id="type">
      <rect x="232" y="56" width="0" height="24">
        <animate attributeName="width" values="0;245;245;0" keyTimes="0;0.45;0.9;1" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.55"/>

  <!-- drifting spotlight -->
  <ellipse cx="300" cy="150" rx="520" ry="300" fill="url(#spot)">
    <animate attributeName="cx" values="200;1000;200" dur="14s" repeatCount="indefinite"/>
  </ellipse>

  <!-- scan line -->
  <rect x="0" y="0" width="1200" height="2" fill="#2F80ED" opacity="0.14">
    <animate attributeName="y" values="-4;304;-4" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- floating particles -->
  <g>
    <circle cx="150" cy="300" r="2" fill="#2F80ED" opacity="0.7"><animate attributeName="cy" values="310;-10" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="300" r="1.6" fill="#56CCF2" opacity="0.6"><animate attributeName="cy" values="310;-10" dur="11s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="300" r="2.2" fill="#c3704c" opacity="0.6"><animate attributeName="cy" values="310;-10" dur="10s" begin="4s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="300" r="1.5" fill="#2F80ED" opacity="0.6"><animate attributeName="cy" values="310;-10" dur="12s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="300" r="2" fill="#56CCF2" opacity="0.5"><animate attributeName="cy" values="310;-10" dur="8.5s" begin="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- rotating orbit decoration (right) -->
  <g transform="translate(1015,150)" opacity="0.85">
    <g>
      <circle r="74" fill="none" stroke="#c3704c" stroke-width="1.4" stroke-dasharray="6 10" opacity="0.45"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="50" fill="none" stroke="#2F80ED" stroke-width="1.4" stroke-dasharray="4 8" opacity="0.6"/>
      <circle cx="50" cy="0" r="3.5" fill="#56CCF2"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="16s" repeatCount="indefinite"/>
    </g>
    <circle r="6" fill="#c3704c"/>
    <circle r="6" fill="none" stroke="#2F80ED" stroke-width="1.5"/>
  </g>

  <!-- terminal prompt line -->
  <text x="70" y="74" font-size="16" font-family="'Fira Code', monospace">
    <tspan fill="#56CCF2">dihas</tspan><tspan fill="#6e7681">@</tspan><tspan fill="#2F80ED">github</tspan><tspan fill="#6e7681">:</tspan><tspan fill="#c3704c">~</tspan><tspan fill="#6e7681">$</tspan>
  </text>
  <g clip-path="url(#type)">
    <text x="232" y="74" font-size="16" font-family="'Fira Code', monospace" fill="#c9d1d9">whoami &amp;&amp; cat skills.md</text>
  </g>
  <rect y="60" width="9" height="16" fill="#2F80ED">
    <animate attributeName="x" values="234;479;479;234" keyTimes="0;0.45;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- name -->
  <text x="68" y="180" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="68" letter-spacing="2" fill="url(#name)" filter="url(#glow)">DIHAS SATHNINDU</text>

  <!-- role -->
  <text x="71" y="218" font-family="'Fira Code', monospace" font-size="18" letter-spacing="0.5" fill="#c9d1d9">Software Engineer &#183; Backend &#183; PL/SQL &#183; AI Research</text>

  <!-- animated accent underline -->
  <rect x="71" y="234" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;470" dur="1.6s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- status chips -->
  <g font-family="'Fira Code', monospace" font-size="12.5">
    <g transform="translate(71,258)">
      <rect width="190" height="26" rx="13" fill="#2F80ED" fill-opacity="0.12" stroke="#2F80ED" stroke-opacity="0.4"/>
      <text x="16" y="17" fill="#7fb3ff">First Class CS Graduate</text>
    </g>
    <g transform="translate(273,258)">
      <rect width="92" height="26" rx="13" fill="#c3704c" fill-opacity="0.14" stroke="#c3704c" stroke-opacity="0.45"/>
      <text x="16" y="17" fill="#e0a07f">ex-IFS</text>
    </g>
    <g transform="translate(377,258)">
      <rect width="200" height="26" rx="13" fill="#2F80ED" fill-opacity="0.12" stroke="#2F80ED" stroke-opacity="0.4"/>
      <text x="16" y="17" fill="#7fb3ff">Founder @ DarvinCode</text>
    </g>
  </g>
</svg>
